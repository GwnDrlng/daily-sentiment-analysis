# Rigor layer config (versioned in git — changes are auditable).
#
# The generator model MUST match agent/agent.ts — replay rollouts are only
# meaningful if they run on the same model that writes production briefings.

models:
  generator: glm-5.2:cloud   # replay synthesis (Ollama Cloud, same as the Eve agent)
  judge: claude-opus-4-8     # judge must be >= the writer to catch its errors
  optimizer: claude-opus-4-8 # proposer quality matters — it writes the trainable prompt

effort:
  judge: high
  optimizer: high

# Offline prompt-training loop (python -m rigor.optimize): replay frozen research
# cases, propose bounded edits to agent/instructions.md, accept only if held-out
# validation improves.
optimizer:
  experiments: 6         # proposals per session (each costs ~1 val rollout set)
  val_cases: 1           # newest N replay cases held out for the accept/reject gate
  judge_samples: 1       # raise to 2-3 to average out judge noise (costs more)
  epsilon: 0.05          # min val improvement (on the 1-5 scale) to accept an edit
  max_usd: 12.0          # hard ceiling per optimization session
  max_prompt_words: 1500 # hard cap on the trainable prompt's size

# Hard ceiling for a single eval run — abort cleanly if exceeded.
budget:
  max_usd_per_run: 4.0

# Per-1M-token pricing for cost estimation (USD). Standard (not intro) rates so
# the cap errs on the safe side. Ollama Cloud usage is subscription-billed, so
# GLM replay tokens are metered but cost $0 here.
pricing:
  claude-opus-4-8:
    input: 5.0
    output: 25.0
  claude-sonnet-5:
    input: 3.0
    output: 15.0
  glm-5.2:cloud:
    input: 0.0
    output: 0.0
